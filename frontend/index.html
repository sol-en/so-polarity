<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Accounting - Financial System</title>
    <link rel="stylesheet" href="style.css?v=7">
    <link rel="stylesheet" href="print.css" media="print">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/litepicker/dist/plugins/ranges.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🏠</div>
                    <span>HOA Accounting</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active" data-page="dashboard"><a href="#"><i class="fas fa-chart-line"></i> Головна</a></li>
                    <li data-page="transactions"><a href="#"><i class="fas fa-exchange-alt"></i> Транзакції</a></li>
                    <li data-page="charges"><a href="#"><i class="fas fa-file-invoice-dollar"></i> Нарахування</a></li>
                    <li data-page="reports"><a href="#"><i class="fas fa-print"></i> Друк</a></li>
                    <li data-page="settings"><a href="#"><i class="fas fa-cog"></i> Налаштування</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">👤</div>
                    <span>Administrator</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Dashboard</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-sun"></i></button>
                    <button class="btn btn-primary" id="btn-recalculate">
                        <i class="fas fa-sync"></i> Recalculate
                    </button>
                    <div class="period-selector-container custom-dropdown-container" style="position: relative;">
                        <button id="custom-period-btn" class="btn btn-secondary" style="width: 260px; text-align: left; background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--accent-color); padding: 0.5rem 1rem; border-radius: 6px; outline: none; display: flex; justify-content: space-between; align-items: center;">
                            <span><i class="far fa-calendar-alt"></i> <span id="custom-period-text">Select period...</span></span>
                            <i class="fas fa-caret-down"></i>
                        </button>
                        
                        <div id="custom-period-dropdown" class="period-dropdown" style="display: none; position: absolute; top: 110%; right: 0; background: var(--dropdown-bg, rgba(20, 28, 36, 0.95)); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); width: 260px; z-index: 1000; backdrop-filter: blur(16px);">
                            <div id="period-menu-main" class="period-menu-page">
                                <div class="period-menu-item" data-action="last7"><i class="fas fa-check check-icon" style="opacity: 0"></i> Last 7 days</div>
                                <div class="period-menu-item" data-action="today"><i class="fas fa-check check-icon" style="opacity: 0"></i> Today</div>
                                <div class="period-menu-item" data-action="yesterday"><i class="fas fa-check check-icon" style="opacity: 0"></i> Yesterday</div>
                                <div class="period-menu-item" data-action="thisMonth"><i class="fas fa-check check-icon" style="opacity: 0"></i> This month</div>
                                <div class="period-menu-item" data-action="prevMonth"><i class="fas fa-check check-icon" style="opacity: 0"></i> Last month</div>
                                <div class="period-menu-item has-submenu" data-target="period-menu-month"><span>Month</span> <i class="fas fa-chevron-right"></i></div>
                                <div class="period-menu-item has-submenu" data-target="period-menu-quarter"><span>Quarter</span> <i class="fas fa-chevron-right"></i></div>
                                <div class="period-menu-item has-submenu" data-target="period-menu-year"><span>Year</span> <i class="fas fa-chevron-right"></i></div>
                                <div class="period-menu-item has-submenu" data-target="period-menu-custom"><span><i class="far fa-calendar-alt"></i> Період</span> <i class="fas fa-chevron-right"></i></div>
                            </div>
                            
                            <div id="period-menu-year" class="period-menu-page" style="display: none;">
                                <div class="period-menu-header" data-back="period-menu-main"><i class="fas fa-arrow-left"></i> Рік</div>
                                <div id="year-options-container" class="period-options-list"></div>
                            </div>

                            <div id="period-menu-quarter" class="period-menu-page" style="display: none;">
                                <div class="period-menu-header" data-back="period-menu-main"><i class="fas fa-arrow-left"></i> Квартал</div>
                                <div id="quarter-options-container" class="period-options-list"></div>
                            </div>

                            <div id="period-menu-month" class="period-menu-page" style="display: none;">
                                <div class="period-menu-header" data-back="period-menu-main"><i class="fas fa-arrow-left"></i> Місяць</div>
                                <div id="month-options-container" class="period-options-list"></div>
                            </div>

                            <div id="period-menu-custom" class="period-menu-page" style="display: none; width: auto; min-width: 600px; right: 0; position: absolute; background: var(--dropdown-bg, rgba(20, 28, 36, 0.95)); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); backdrop-filter: blur(16px);">
                                <div class="period-menu-header" data-back="period-menu-main"><i class="fas fa-arrow-left"></i> Період</div>
                                <div id="litepicker-container" style="padding: 1rem;"></div>
                                <div style="display: flex; justify-content: flex-start; gap: 10px; padding: 1rem; border-top: 1px solid var(--border-color);">
                                    <button class="btn btn-primary" id="custom-period-apply">Apply</button>
                                    <button class="btn btn-secondary" id="custom-period-cancel">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div id="content-area">
                <!-- Content will be injected here by app.js -->
                <div class="loader">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Edit</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form content -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Cancel</button>
                <button class="btn btn-primary" id="modal-submit">Save</button>
            </div>
        </div>
    </div>

    <!-- Month Picker Modal -->
    <div id="month-picker-modal" class="modal-overlay" style="display: none; align-items: center; justify-content: center;">
        <div class="custom-month-picker" style="background: var(--bg-card); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--border-color); width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-color);">
                <button class="btn btn-sm" onclick="changePickerYear(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="picker-year-display" style="font-weight: 600; font-size: 1.2rem;">2026</span>
                <button class="btn btn-sm" onclick="changePickerYear(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div id="picker-month-grid" class="month-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border-color); padding: 1px;">
                <!-- Months will be injected by JS -->
            </div>
            <div style="padding: 0.5rem; background: var(--bg-card);">
                <button class="btn btn-secondary" style="width: 100%" onclick="closeMonthPicker()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="print-container" id="print-area"></div>

    <script src="app.js?v=26"></script>

</body>
</html>
